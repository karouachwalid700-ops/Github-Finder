<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitFinder</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- CSS File -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="logo">Git<span>Finder</span></div>

    <div class="fav-btn">
      Favoris <span class="fav-count" id="favoris-count">0</span>
    </div>
  </header>

  <hr class="divider">

  <!-- ================= SEARCH SECTION ================= -->
  <section class="search-section" id="search-input">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Nom d'utilisateur GitHub...">
      <button id="searchBtn">Rechercher</button>
    </div>

    <!-- Error message -->
    <div class="error" id="errorState">
      Utilisateur non trouvé
    </div>
  </section>

<!-- ================= LOADING SECTION ================= -->
<section class="loading-section" id="loadingState">

  <div class="loader-container">
    <div class="loader-title">Chargement des données</div>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

</section>

  <!-- ================= HERO SECTION ================= -->
  <section class="hero" id="welcomeState">
    <p>🔍</p>
    <h1>Explorez les profils GitHub</h1>
    <p>
      Entrez un nom d'utilisateur pour afficher ses statistiques publiques.
    </p>
  </section>

  <!-- profile section -->

<section class="profile-section">

  <!-- titles -->
  <div class="titles">
    <h2>Profil</h2>
    <h2 class="repo">Repositories</h2>
  </div>

  <!-- cards -->
  <div class="profile-container">
    <div id="userProfile"></div>
    <div id="reposList" class="repos"></div>
  </div>

</section>

  <!-- ================= FAVORITES SECTION ================= -->
<section class="favorites-section" id="favoris-List">

  <h2>Favoris</h2>

  <div class="favorites-container">

    <div class="favorite-card">
      <img src="profile.jpg" alt="">
      <div class="fav-info">
        <h4>Brixo_dev_75</h4>
        <p>@akarouachwalid700-ops</p>
      </div>
      <button class="remove-btn">Supprimer</button>
    </div>

    <div class="favorite-card">
      <img src="profile.jpg" alt="">
      <div class="fav-info">
        <h4>AnotherUser</h4>
        <p>@another-dev</p>
      </div>
      <button class="remove-btn">Supprimer</button>
    </div>

  </div>

</section>

<script src="script.js"></script>
</body>
</html>
