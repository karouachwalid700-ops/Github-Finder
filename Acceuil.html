<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/logo github.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Github Finder</title>
</head>
<body>
    <header class="navbar">
          <img src="images/logo navbar.png" alt="logo Github">
            <li><a href="#">Favoris <span id="count">0</span></a></li>
    </header>

    <section class="title">
         <h1>WELCOME TO GITHUB FINDER <i class="fa-solid fa-magnifying-glass search-icon"></i></h1>
    </section>


    <section class="search">
        <input type="text" placeholder="Search Github Username...">
        <button type="submit">Search</button>
    </section>

    <div id="welcomeState" class="find-username">
       <i class="fa-solid fa-magnifying-glass search-icon"></i>
       <h2>Find GitHub Users</h2>
       <p>Search for any GitHub username to get started</p>
    </div>

    
    <div id="loadingState" class="loading">
        <div class="inline-block">
        </div>
        <p>loading...</p>
    </div>
    
</body>
</html>
