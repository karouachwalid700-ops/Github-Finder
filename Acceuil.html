<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitFinder</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <div class="logo">Git<span>Finder</span></div>

  <div class="fav-btn">
     Favoris <span class="fav-count" id="favoris-count">0</span>
  </div>
</header>
<br>
<hr class="divider">


<!-- ================= SEARCH ================= -->
<section>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Nom d'utilisateur GitHub...">
    <button id="searchBtn">Rechercher</button>
  </div>

  <div class="error" id="errorState"></div>
</section>

<!-- ================= LOADING ================= -->
<section class="loading-section" id="loadingState">
  <div class="loader-container">
    <div class="loader-title">Chargement...</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
</section>

<!-- ================= HERO ================= -->
<section class="hero" id="welcomeState">
  <p class="icon-search">🔎</p>
  <h1>Explore GitHub Profiles</h1>
  <p>Search any developer and view stats + repositories</p>
</section>

<!-- ================= PROFILE ================= -->
<section class="profile-container">

  <div id="userProfile"></div>

  <div id="reposList"></div>

</section>

<!-- ================= FAVORITES ================= -->
<section class="favorites-section">
  <h2 class="title-fav">Favoris</h2>

  <div class="favorites-container" id="favoris-List"></div>
</section>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
